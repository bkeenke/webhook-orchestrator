<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webhook Orchestrator</title>
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.18/dist/json-formatter.min.css">
<script src="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.18/dist/json-formatter.umd.min.js"></script>
<style>
  [x-cloak]{display:none!important}
  .toggle-bg{transition:background-color .2s}
  input:focus,select:focus,textarea:focus{outline:none}
  .json-formatter-dark{background:transparent}
</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans" x-data="app()" x-cloak>

<div x-show="!authed" class="min-h-screen flex items-center justify-center bg-gray-900">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl font-bold">W</div>
      <div>
        <div class="font-bold text-lg leading-tight dark:text-white">Webhook Orchestrator</div>
        <div class="text-xs text-gray-400" x-text="t('management_panel')"></div>
      </div>
    </div>
    <form @submit.prevent="login">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="t('username')"></label>
        <input x-model="loginForm.user" type="text" autocomplete="username"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 ring-2 ring-transparent focus:ring-blue-500 focus:border-blue-500 transition"
          placeholder="admin">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="t('password')"></label>
        <input x-model="loginForm.pass" type="password" autocomplete="current-password"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white ring-2 ring-transparent focus:ring-blue-500 focus:border-blue-500 transition">
      </div>
      <div x-show="loginError" class="mb-4 text-sm text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 px-3 py-2 rounded-lg" x-text="t('invalid_creds')"></div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg py-2.5 text-sm transition"
        x-text="t('sign_in')">
      </button>
    </form>
  </div>
</div>

<div x-show="authed" class="flex h-screen overflow-hidden">

  <aside class="w-52 flex-shrink-0 bg-gray-900 text-white flex flex-col">
    <div class="p-4 pb-3 border-b border-gray-700/60">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold text-sm">W</div>
        <div class="text-sm font-semibold">Orchestrator</div>
      </div>
    </div>
    <nav class="flex-1 p-2 space-y-0.5 mt-1">
      <button @click="tab='sources'"
        :class="tab==='sources' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
        class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition text-left">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span x-text="t('sources')"></span>
      </button>
      <button @click="tab='targets'"
        :class="tab==='targets' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
        class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition text-left">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span x-text="t('targets')"></span>
      </button>
      <button @click="tab='logs'; loadLogs(); loadLogFilters()"
        :class="tab==='logs' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
        class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition text-left">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span x-text="t('logs')"></span>
      </button>
    </nav>
    <div class="p-2 border-t border-gray-700/60 space-y-0.5">
      <button @click="toggleLang()"
        class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition text-left">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
        <span x-text="lang === 'ru' ? 'English' : 'Русский'"></span>
      </button>
      <button @click="toggleTheme()"
        class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition text-left">
        <svg x-show="darkMode" class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg x-show="!darkMode" class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <span x-text="darkMode ? t('light_mode') : t('dark_mode')"></span>
      </button>
      <button @click="logout"
        class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition text-left">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span x-text="t('sign_out')"></span>
      </button>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-900">

    <div x-show="tab==='sources'" class="p-6 max-w-4xl">
      <div class="flex items-center justify-between mb-5">
        <h1 class="text-xl font-bold text-gray-900 dark:text-white" x-text="t('sources')"></h1>
        <button @click="openSrcModal(null)"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg transition font-medium"
          x-text="t('add_source')">
        </button>
      </div>

      <div class="space-y-3">
        <template x-for="src in sources" :key="src.id">
          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
            <div class="flex items-center gap-3 p-4">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-0.5">
                  <span class="font-semibold text-gray-900 dark:text-white text-sm" x-text="src.name || src.path"></span>
                  <span x-show="src.sync_response"
                    class="text-xs bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 px-1.5 py-0.5 rounded-full font-medium">sync</span>
                </div>
                <code class="text-xs text-gray-400" x-text="src.path"></code>
              </div>
              <div class="flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500 mr-2">
                <span x-text="fmtRulesCount((src.rules||[]).length)"></span>
              </div>
              <div class="flex gap-1">
                <button @click="openSrcModal(src)"
                  class="text-xs text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 px-2.5 py-1.5 rounded-lg transition font-medium"
                  x-text="t('edit')"></button>
                <button @click="deleteSource(src.id)"
                  class="text-xs text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 px-2.5 py-1.5 rounded-lg transition font-medium"
                  x-text="t('delete')"></button>
              </div>
            </div>
            <div x-show="(src.rules||[]).length > 0" class="border-t border-gray-100 dark:border-gray-700 px-4 pb-3 pt-2.5 space-y-1.5">
              <template x-for="rule in src.rules" :key="rule.id">
                <div class="flex items-center gap-2 text-xs">
                  <span class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 font-mono px-1.5 py-0.5 rounded font-medium" x-text="rule.name||'(unnamed)'"></span>
                  <span class="text-gray-300 dark:text-gray-600">→</span>
                  <template x-for="tid in (rule.targets||[])">
                    <span class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-1.5 py-0.5 rounded font-mono" x-text="tid"></span>
                  </template>
                  <span x-show="(rule.conditions||[]).length" class="text-gray-400 ml-auto"
                    x-text="fmtCondCount((rule.conditions||[]).length)"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
        <div x-show="sources.length===0" class="text-center py-16 text-gray-400 dark:text-gray-500 text-sm">
          <div class="text-4xl mb-3">🔗</div>
          <span x-text="t('no_sources')"></span>
        </div>
      </div>
    </div>

    <div x-show="tab==='targets'" class="p-6 max-w-4xl">
      <div class="flex items-center justify-between mb-5">
        <h1 class="text-xl font-bold text-gray-900 dark:text-white" x-text="t('targets')"></h1>
        <button @click="openTgtModal(null)"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg transition font-medium"
          x-text="t('add_target')">
        </button>
      </div>

      <div class="space-y-3">
        <template x-for="tgt in targets" :key="tgt.id">
          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-4">
            <div class="flex items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                  <code class="font-semibold text-gray-900 dark:text-white text-sm" x-text="tgt.id"></code>
                  <span x-show="tgt.primary"
                    class="text-xs bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 px-1.5 py-0.5 rounded-full font-medium" x-text="t('badge_primary')"></span>
                  <span x-show="tgt.forward_ip"
                    class="text-xs bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 px-1.5 py-0.5 rounded-full font-medium" x-text="t('badge_fwd_ip')"></span>
                  <span x-show="tgt.retry && tgt.retry.enabled"
                    class="text-xs bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 px-1.5 py-0.5 rounded-full font-medium"
                    x-text="'retry ×'+(tgt.retry.max_attempts||3)+' / '+(tgt.retry.interval||'60s')"></span>
                  <span x-show="!tgt.retry || !tgt.retry.enabled"
                    class="text-xs bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-1.5 py-0.5 rounded-full font-medium" x-text="t('no_retry')"></span>
                </div>
                <div class="text-xs text-gray-400 truncate" x-text="tgt.url"></div>
              </div>
              <div class="flex gap-1 flex-shrink-0">
                <button @click="openTgtModal(tgt)"
                  class="text-xs text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/30 px-2.5 py-1.5 rounded-lg transition font-medium"
                  x-text="t('edit')"></button>
                <button @click="deleteTarget(tgt.id)"
                  class="text-xs text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 px-2.5 py-1.5 rounded-lg transition font-medium"
                  x-text="t('delete')"></button>
              </div>
            </div>
          </div>
        </template>
        <div x-show="targets.length===0" class="text-center py-16 text-gray-400 dark:text-gray-500 text-sm">
          <div class="text-4xl mb-3">🎯</div>
          <span x-text="t('no_targets')"></span>
        </div>
      </div>
    </div>

    <div x-show="tab==='logs'" class="p-6">
      <div class="flex items-center justify-between mb-5">
        <h1 class="text-xl font-bold text-gray-900 dark:text-white" x-text="t('request_logs')"></h1>
        <div class="flex gap-2">
          <button @click="loadLogs()"
            class="text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white border border-gray-300 dark:border-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition"
            x-text="t('refresh')">
          </button>
          <button @click="clearLogs()"
            class="text-sm text-red-500 border border-red-200 dark:border-red-800 px-3 py-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/30 transition"
            x-text="t('clear')">
          </button>
        </div>
      </div>

      <div class="flex gap-2 mb-3">
        <input type="search"
          x-model="searchQuery"
          @input="clearTimeout(searchTimer); searchTimer=setTimeout(()=>{logsPage=0;loadLogs()},350)"
          @keydown.escape="searchQuery=''; logsPage=0; loadLogs()"
          :placeholder="t('search_placeholder')"
          class="flex-1 border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        <select x-model="logFilterSource" @change="logsPage=0; loadLogs()"
          class="border border-gray-300 dark:border-gray-600 rounded-xl px-3 py-2.5 text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
          <option value="" x-text="t('filter_source')"></option>
          <template x-for="s in logFilterOptions.sources" :key="s">
            <option :value="s" x-text="s"></option>
          </template>
        </select>
        <select x-model="logFilterTarget" @change="logsPage=0; loadLogs()"
          class="border border-gray-300 dark:border-gray-600 rounded-xl px-3 py-2.5 text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
          <option value="" x-text="t('filter_target')"></option>
          <template x-for="tg in logFilterOptions.targets" :key="tg">
            <option :value="tg" x-text="tg"></option>
          </template>
        </select>
      </div>

      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
            <tr>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" x-text="t('col_time')"></th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" x-text="t('col_source_path')"></th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" x-text="t('col_client_ip')"></th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" x-text="t('col_targets')"></th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide" x-text="t('col_size')"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
            <template x-for="log in logs" :key="log.id">
              <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/40 cursor-pointer transition select-none"
                @click="openLog(log)">
                <td class="px-4 py-3 font-mono text-xs text-gray-500 dark:text-gray-400 whitespace-nowrap" x-text="fmtTime(log.timestamp)"></td>
                <td class="px-4 py-3">
                  <div class="font-medium text-gray-900 dark:text-white text-xs" x-text="log.source_name"></div>
                  <div class="text-gray-400 font-mono text-xs" x-text="log.path"></div>
                </td>
                <td class="px-4 py-3 font-mono text-xs text-gray-500 dark:text-gray-400" x-text="log.client_ip"></td>
                <td class="px-4 py-3">
                  <div class="flex gap-1 flex-wrap">
                    <template x-for="t2 in (log.targets||[])">
                      <span class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs px-1.5 py-0.5 rounded font-mono" x-text="t2"></span>
                    </template>
                    <span x-show="!(log.targets||[]).length" class="text-gray-400 text-xs italic" x-text="t('no_match')"></span>
                  </div>
                </td>
                <td class="px-4 py-3 text-xs text-gray-400" x-text="fmtBytes(log.body_size)"></td>
              </tr>
            </template>
            <tr x-show="logs.length===0">
              <td colspan="5" class="text-center text-gray-400 dark:text-gray-500 py-16 text-sm"
                x-text="searchQuery.trim() ? t('search_no_results') : t('no_logs')"></td>
            </tr>
          </tbody>
        </table>
        <div class="flex items-center justify-between px-4 py-3 border-t border-gray-200 dark:border-gray-700">
          <div class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
            <span x-text="fmtShowing()"></span>
            <select x-model.number="logsLimit" @change="logsPage=0; loadLogs()"
              class="border border-gray-300 dark:border-gray-600 rounded-md px-1.5 py-1 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div class="flex items-center gap-1 text-xs">
            <button @click="logsPage--; loadLogs()" :disabled="logsPage===0"
              class="px-2.5 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 disabled:opacity-40 disabled:cursor-default transition">←</button>
            <span class="px-3 text-gray-600 dark:text-gray-400"
              x-text="(logsPage+1) + ' / ' + Math.max(1, Math.ceil(logsTotal/logsLimit))"></span>
            <button @click="logsPage++; loadLogs()" :disabled="(logsPage+1)*logsLimit>=logsTotal"
              class="px-2.5 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 disabled:opacity-40 disabled:cursor-default transition">→</button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div x-show="lm.open" class="fixed inset-0 z-50 flex items-start justify-center pt-6 pb-6 overflow-y-auto"
  style="background:rgba(0,0,0,0.7)" @click.self="lm.open=false" @keydown.escape.window="lm.open=false">
  <div class="bg-gray-900 rounded-2xl shadow-2xl w-full max-w-3xl mx-4 my-auto" @click.stop>
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
      <div x-show="lm.loading" class="text-gray-400 text-sm animate-pulse" x-text="t('loading')"></div>
      <div x-show="!lm.loading" class="flex items-center gap-3 flex-wrap min-w-0">
        <span class="text-xs font-bold px-2 py-0.5 rounded bg-blue-600 text-white font-mono" x-text="(lm.log||{}).method"></span>
        <span class="font-mono text-sm text-gray-200 truncate" x-text="(lm.log||{}).path"></span>
        <span class="text-xs text-gray-500 whitespace-nowrap" x-text="fmtTime((lm.log||{}).timestamp)"></span>
      </div>
      <button @click="lm.open=false" class="text-gray-400 hover:text-white text-2xl leading-none w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-700 ml-4 shrink-0">×</button>
    </div>

    <div x-show="lm.loading" class="flex items-center justify-center py-20">
      <svg class="animate-spin w-8 h-8 text-blue-500" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
      </svg>
    </div>

    <div x-show="!lm.loading" class="px-6 py-4 space-y-5 overflow-y-auto max-h-[78vh]">
      <div class="flex gap-x-6 gap-y-1.5 flex-wrap text-xs">
        <div class="flex gap-1.5 items-center">
          <span class="text-gray-500 uppercase tracking-wide font-semibold" x-text="t('col_client_ip')"></span>
          <span class="text-gray-300 font-mono" x-text="(lm.log||{}).client_ip"></span>
        </div>

function app() {
  return {
    authed: false,
    tab: 'sources',
    lang: localStorage.getItem('lang') || 'ru',
    darkMode: document.documentElement.classList.contains('dark'),

    loginForm: { user: '', pass: '' },
    loginError: false,

    sources: [],
    targets: [],
    logs: [],
    expandedLog: null,

    lm: { open: false, log: null, loading: false },
    logsPage: 0,
    logsLimit: 50,
    logsTotal: 0,
    searchQuery: '',
    searchTimer: null,
    logFilterSource: '',
    logFilterTarget: '',
    logFilterOptions: { sources: [], targets: [] },

    sm: { open: false, id: null, name: '', path: '', sync_response: false, rules: [] },
    tm: {
      open: false, _orig: null,
      id: '', url: '', timeout: '30s', forward_ip: true, primary: false,
      headers: [],
      retry: { enabled: true, max_attempts: 3, interval: '60s', backoff: 'fixed' },
      _stopStatus: '200',
      _stopBody: '',
    },

    async init() {
      const r = await fetch('/api/me');
      if (r.ok) { this.authed = true; await this.loadAll(); }
    },

    t(key) {
      return (i18n[this.lang] || i18n.ru)[key] || key;
    },

    toggleTheme() {
      this.darkMode = !this.darkMode;
      if (this.darkMode) {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      }
    },

    toggleLang() {
      this.lang = this.lang === 'ru' ? 'en' : 'ru';
      localStorage.setItem('lang', this.lang);
    },

    fmtRulesCount(n) {
      if (this.lang === 'ru') {
        const s = n % 10 === 1 && n % 100 !== 11 ? 'правило'
                : n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20) ? 'правила'
                : 'правил';
        return n + ' ' + s;
      }
      return n + ' rule' + (n === 1 ? '' : 's');
    },

    fmtCondCount(n) {
      return this.lang === 'ru' ? n + ' усл.' : n + ' cond';
    },

    async loadAll() {
      const [s, t] = await Promise.all([
        fetch('/api/sources').then(r => r.json()),
        fetch('/api/targets').then(r => r.json()),
      ]);
      this.sources = s || [];
      this.targets = t || [];
    },

    async loadLogs() {
      const offset = this.logsPage * this.logsLimit;
      const params = new URLSearchParams({ limit: this.logsLimit, offset });
      if (this.searchQuery.trim()) params.set('q', this.searchQuery.trim());
      if (this.logFilterSource) params.set('source', this.logFilterSource);
      if (this.logFilterTarget) params.set('target', this.logFilterTarget);
      const r = await fetch(`/api/logs?${params}`);
      const data = await r.json();
      this.logs = data.items || [];
      this.logsTotal = data.total || 0;
    },

    async loadLogFilters() {
      const r = await fetch('/api/logs/filters');
      if (r.ok) this.logFilterOptions = await r.json();
    },

    async login() {
      this.loginError = false;
      const r = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.loginForm),
      });
      if (r.ok) { this.authed = true; await this.loadAll(); }
      else { this.loginError = true; }
    },

    async logout() {
      await fetch('/auth/logout', { method: 'POST' });
      this.authed = false;
    },

    openSrcModal(src) {
      if (src) {
        this.sm = {
          open: true, id: src.id,
          name: src.name || '', path: src.path || '',
          sync_response: !!src.sync_response,
          rules: (src.rules || []).map(r => this._ruleToForm(r)),
        };
      } else {
        this.sm = { open: true, id: null, name: '', path: '', sync_response: false, rules: [] };
      }
    },

    addRule() {
      this.sm.rules.push({ _key: Math.random().toString(36).slice(2), id: '', name: '', logic: 'AND', targets: [], conditions: [] });
    },

    _ruleToForm(r) {
      return {
        _key: r.id || Math.random().toString(36).slice(2),
        id: r.id || '',
        name: r.name || '',
        logic: r.logic || 'AND',
        targets: r.targets ? [...r.targets] : [],
        conditions: (r.conditions || []).map(c => ({
          field: c.field || '',
          op: c.op || 'eq',
          value: c.value || '',
          any_field: c.any_field || [],
          values: c.values || [],
          _ft: (c.any_field && c.any_field.length) ? 'any' : 'field',
          _anyStr: (c.any_field || []).join(', '),
          _valStr: (c.values || []).join(', '),
        })),
      };
    },

    _ruleFromForm(r) {
      return {
        id: r.id,
        name: r.name,
        logic: r.logic,
        targets: r.targets,
        conditions: r.conditions.map(c => ({
          field: c._ft === 'field' ? c.field : '',
          any_field: c._ft === 'any' ? c._anyStr.split(',').map(s => s.trim()).filter(Boolean) : [],
          op: c.op,
          value: ['in','not_in'].includes(c.op) ? '' : (c.value || ''),
          values: ['in','not_in'].includes(c.op) ? c._valStr.split(',').map(s => s.trim()).filter(Boolean) : [],
        })),
      };
    },

    async saveSource() {
      const body = {
        id: this.sm.id,
        name: this.sm.name,
        path: this.sm.path,
        sync_response: this.sm.sync_response,
        rules: this.sm.rules.map(r => this._ruleFromForm(r)),
      };
      const method = this.sm.id ? 'PUT' : 'POST';
      const url = this.sm.id ? `/api/sources/${this.sm.id}` : '/api/sources';
      const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (r.ok) { await this.loadAll(); this.sm.open = false; }
      else { alert('Error: ' + await r.text()); }
    },

    async deleteSource(id) {
      if (!confirm(this.t('confirm_del_source'))) return;
      await fetch(`/api/sources/${id}`, { method: 'DELETE' });
      await this.loadAll();
    },

    openTgtModal(tgt) {
      if (tgt) {
        const retry = tgt.retry || {};
        this.tm = {
          open: true, _orig: tgt.id,
          id: tgt.id, url: tgt.url, timeout: tgt.timeout || '30s',
          forward_ip: tgt.forward_ip !== false,
          primary: !!tgt.primary,
          headers: Object.entries(tgt.headers || {}).map(([k, v]) => ({ k, v })),
          retry: {
            enabled: !!retry.enabled,
            max_attempts: retry.max_attempts || 3,
            interval: retry.interval || '60s',
            backoff: retry.backoff || 'fixed',
          },
          _stopStatus: (retry.disable_on_status || []).join(', '),
          _stopBody: (retry.disable_on_body_contains || []).join(', '),
        };
      } else {
        this.tm = {
          open: true, _orig: null,
          id: '', url: '', timeout: '30s', forward_ip: true, primary: false,
          headers: [],
          retry: { enabled: true, max_attempts: 3, interval: '60s', backoff: 'fixed' },
          _stopStatus: '200', _stopBody: '',
        };
      }
    },

    async saveTarget() {
      const headers = {};
      for (const h of this.tm.headers) { if (h.k) headers[h.k] = h.v; }
      const body = {
        id: this.tm.id, url: this.tm.url, timeout: this.tm.timeout,
        forward_ip: this.tm.forward_ip, primary: this.tm.primary,
        headers,
        retry: {
          enabled: this.tm.retry.enabled,
          max_attempts: this.tm.retry.max_attempts,
          interval: this.tm.retry.interval,
          backoff: this.tm.retry.backoff,
          disable_on_status: this.tm._stopStatus.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n)),
          disable_on_body_contains: this.tm._stopBody.split(',').map(s => s.trim()).filter(Boolean),
        },
      };
      const method = this.tm._orig ? 'PUT' : 'POST';
      const url = this.tm._orig ? `/api/targets/${this.tm._orig}` : '/api/targets';
      const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (r.ok) { await this.loadAll(); this.tm.open = false; }
      else { alert('Error: ' + await r.text()); }
    },

    async deleteTarget(id) {
      if (!confirm(this.t('confirm_del_target').replace('{id}', id))) return;
      await fetch(`/api/targets/${id}`, { method: 'DELETE' });
      await this.loadAll();
    },

    async openLog(log) {
      this.lm = { open: true, log: null, loading: true };
      try {
        const r = await fetch(`/api/logs/${log.id}`);
        const full = await r.json();
        this.lm.log = full;
        this.lm.loading = false;
        await this.$nextTick();
        this._renderBodyViewer(full.body);
      } catch {
        this.lm.loading = false;
      }
    },

    _renderBodyViewer(body) {
      const el = this.$refs.bodyViewer;
      if (!el) return;
      el.innerHTML = '';
      if (!body) {
        el.innerHTML = `<span class="text-gray-500 italic text-xs">${this.t('empty_body')}</span>`;
        return;
      }
      try {
        const data = JSON.parse(body);
        const fmt = new JSONFormatter(data, 2, {
          hoverPreviewEnabled: true,
          theme: this.darkMode ? 'dark' : '',
        });
        el.appendChild(fmt.render());
      } catch {
        const pre = document.createElement('pre');
        pre.className = 'text-green-300 whitespace-pre-wrap break-all text-xs font-mono';
        pre.textContent = body;
        el.appendChild(pre);
      }
    },

    fmtShowing() {
      if (!this.logsTotal) return this.lang === 'ru' ? 'Нет записей' : 'No records';
      const s = this.logsPage * this.logsLimit + 1;
      const e = Math.min((this.logsPage + 1) * this.logsLimit, this.logsTotal);
      return this.lang === 'ru'
        ? `${s}–${e} из ${this.logsTotal}`
        : `${s}–${e} of ${this.logsTotal}`;
    },

    async clearLogs() {
      if (!confirm(this.t('confirm_clear_logs'))) return;
      await fetch('/api/logs', { method: 'DELETE' });
      this.logs = [];
    },

    fmtTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleString(this.lang === 'ru' ? 'ru-RU' : 'en-GB', {
        hour12: false, day:'2-digit', month:'2-digit',
        hour:'2-digit', minute:'2-digit', second:'2-digit'
      });
    },
    fmtBytes(b) {
      if (!b) return '0 B';
      if (b < 1024) return b + ' B';
      return (b / 1024).toFixed(1) + ' KB';
    },
    renderHeaders(h) {
      const keys = Object.keys(h || {}).sort();
      if (!keys.length) return `<p class="px-3 py-2 text-gray-500 italic">${this.t('no_headers')}</p>`;
      return keys.map(k => {
        const ek = this._esc(k), ev = this._esc(h[k]);
        return `<div class="flex gap-0 border-b border-gray-700 last:border-0"><span class="px-3 py-1.5 text-blue-300 whitespace-nowrap w-48 shrink-0">${ek}</span><span class="px-3 py-1.5 text-gray-300 break-all">${ev}</span></div>`;
      }).join('');
    },
    _esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    },
    prettyBody(body) {
      if (!body) return this.t('empty_body');
      try { return JSON.stringify(JSON.parse(body), null, 2); } catch { return body; }
    },
  };
}
